name: color_picker_plus
description: Full-featured Flutter color picker with hex, HSV, alpha, gradients, presets, recent colors, and design-tool style controls.
version: 1.0.0
homepage: https://fluttercolorpicker.netlify.app/
repository: https://github.com/rayliverified/FlutterColorPicker
issue_tracker: https://github.com/rayliverified/FlutterColorPicker/issues

topics:
  - color-picker
  - flutter
  - gradient
  - design-tools
  - color

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.15
  flutter_test:
    sdk: flutter
